<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pricing Cards</title>
<style>
body {
  font-family: Arial, sans-serif;
  background-color: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 50px;
  gap: 20px;
  flex-wrap: wrap;
}

.pricing {
  width: 300px;
  background-color: #fff;
  box-shadow: 0 0 10px #ccc;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
  transition: transform 0.3s ease;
}

.pricing:hover {
  transform: translateY(-5px);
}

.title {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 10px;
}

.price {
  font-size: 18px;
  color: green;
  margin-bottom: 15px;
}

.features {
  list-style: none;
  padding-left: 0;
  margin-bottom: 15px;
}

.features li {
  padding: 8px 0;
  border-bottom: 1px solid #eee;
}

.btn {
  background: blue;
  color: white;
  padding: 10px 20px;
  border: none;
  cursor: pointer;
  border-radius: 5px;
  transition: background 0.3s;
}

.btn:hover {
  background: darkblue;
}
</style>
</head>
<body>

<div id="pricing-container"></div>

<script>
function Card(title, price, features) {
  const card = document.createElement('div');
  card.className = 'pricing';

  card.innerHTML = `
    <h2 class="title">${title}</h2>
    <p class="price">${price}</p>
    <ul class="features">
      ${features.map(feature => `<li>${feature}</li>`).join('')}
    </ul>
    <button class="btn">Start Trial</button>
  `;

  return card;
}

// Example usage
const pricingContainer = document.getElementById('pricing-container');

const plans = [
  { title: "Basic Plan", price: "$9.99 /month", features: ["1 GB Storage", "Basic Support", "All Core Features"] },
  { title: "Pro Plan", price: "$19.99 /month", features: ["10 GB Storage", "Priority Support", "Advanced Features"] },
  { title: "Enterprise Plan", price: "$49.99 /month", features: ["100 GB Storage", "24/7 Support", "All Features"] },
];

plans.forEach(plan => {
  pricingContainer.appendChild(Card(plan.title, plan.price, plan.features));
});
</script>

</body>
</html>
