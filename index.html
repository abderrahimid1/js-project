<!DOCTYPE html>
<html>
<head>
    <title>Sentence Analysis</title>
</head>
<body>

<script>
let sentence = prompt("Enter a sentence that ends with a point:");

let length = 0;
let words = 1;
let vowels = 0;

for (let i = 0; i < sentence.length; i++) {

    length++;

    if (sentence[i] === " ") {
        words++;
    }

    if ("aeiouAEIOU".includes(sentence[i])) {
        vowels++;
    }
}

console.log("Length:", length);
console.log("Words:", words);
console.log("Vowels:", vowels);

</script>

</body>
</html>
