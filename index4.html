<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Gallery</title>
  <style>
    /* Root variables for light and dark themes */
    :root {
      --bg-color: #f0f0f0;
      --card-bg: #ffffff;
      --text-color: #222222;
      --primary-color: #4CAF50;
      --shadow-color: rgba(0,0,0,0.2);
    }

    body.dark {
      --bg-color: #121212;
      --card-bg: #1e1e1e;
      --text-color: #f0f0f0;
      --primary-color: #4CAF50;
      --shadow-color: rgba(0,0,0,0.7);
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.3s, color 0.3s;
    }

    .container {
      max-width: 1200px;
      margin: 50px auto;
      padding: 0 20px;
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background-color: var(--card-bg);
      border-radius: 10px;
      box-shadow: 0 4px 6px var(--shadow-color);
      width: 300px;
      overflow: hidden;
      text-align: center;
      transform: translateY(20px);
      opacity: 0;
      transition: transform 0.5s ease, opacity 0.5s ease, box-shadow 0.3s;
    }

    .card.fade-in {
      transform: translateY(0);
      opacity: 1;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      transition: transform 0.3s;
    }

    .card:hover img {
      transform: scale(1.05);
    }

    .card h3 {
      margin: 15px 0 10px;
    }

    .card p {
      margin: 0 15px 15px;
    }

    .card button {
      margin-bottom: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      background-color: var(--primary-color);
      color: #fff;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .card button:hover {
      background-color: #388e3c;
    }

    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background-color: var(--primary-color);
      border: none;
      color: #fff;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
      z-index: 1000;
    }

    .theme-toggle:hover {
      background-color: #388e3c;
    }
  </style>
</head>
<body>
  <button class="theme-toggle">Toggle Theme</button>

  <div class="container">
    <div class="card">
      <img src="https://via.placeholder.com/300x200?text=Product+1" alt="Product 1">
      <h3>Product 1</h3>
      <p>High quality product for your needs.</p>
      <button>Buy Now</button>
    </div>
    <div class="card">
      <img src="https://via.placeholder.com/300x200?text=Product+2" alt="Product 2">
      <h3>Product 2</h3>
      <p>Durable and reliable for everyday use.</p>
      <button>Buy Now</button>
    </div>
    <div class="card">
      <img src="https://via.placeholder.com/300x200?text=Product+3" alt="Product 3">
      <h3>Product 3</h3>
      <p>Modern design meets functionality.</p>
      <button>Buy Now</button>
    </div>
  </div>

  <script>
    // Theme toggle
    const toggleBtn = document.querySelector('.theme-toggle');
    toggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark');
    });

    // Fade-in animation for cards
    const cards = document.querySelectorAll('.card');

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if(entry.isIntersecting) {
          entry.target.classList.add('fade-in');
        }
      });
    }, { threshold: 0.2 });

    cards.forEach(card => {
      observer.observe(card);
    });
  </script>
</body>
</html>
