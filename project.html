<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavaScript Functions Interactive</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background: #f5f5f5;
        color: #333;
    }
    h2 { color: #2c3e50; }
    input, button, textarea {
        padding: 8px;
        margin: 5px 0;
        width: 100%;
        max-width: 400px;
    }
    button {
        cursor: pointer;
        background: #3498db;
        color: white;
        border: none;
    }
    button:hover { background: #2980b9; }
    .result { margin: 10px 0; padding: 10px; background: #ecf0f1; border-radius: 5px; }
    section { margin-bottom: 30px; }
</style>
</head>
<body>

<h1>تجربة دوال JavaScript</h1>

<!-- String Functions -->
<section>
    <h2>String Functions</h2>
    <input id="strInput" placeholder="أدخل نص هنا">
    <button onclick="showReverse()">Reverse String</button>
    <button onclick="showCount()">Count Characters</button>
    <button onclick="showCapitalize()">Capitalize Words</button>
    <div id="strResult" class="result"></div>
</section>

<!-- Array Functions -->
<section>
    <h2>Array Functions</h2>
    <input id="arrInput" placeholder="أدخل أرقام مفصولة بفواصل (مثال: 3,7,1)">
    <button onclick="showMax()">Max</button>
    <button onclick="showMin()">Min</button>
    <button onclick="showSum()">Sum</button>
    <button onclick="showFilter()">Filter >= 5</button>
    <div id="arrResult" class="result"></div>
</section>

<!-- Math Functions -->
<section>
    <h2>Mathematical Functions</h2>
    <input id="numInput" placeholder="أدخل رقم">
    <button onclick="showFactorial()">Factorial</button>
    <button onclick="showPrime()">Is Prime?</button>
    <button onclick="showFibonacci()">Fibonacci Sequence</button>
    <div id="mathResult" class="result"></div>
</section>

<script>
// =====================
// 1️⃣ String Functions
// =====================
function reverseString(str) { return str.split('').reverse().join(''); }
function countCharacters(str) { return str.length; }
function capitalizeWords(sentence) {
    return sentence.split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
}

function showReverse() { 
    const str = document.getElementById("strInput").value;
    document.getElementById("strResult").innerText = reverseString(str);
}
function showCount() { 
    const str = document.getElementById("strInput").value;
    document.getElementById("strResult").innerText = countCharacters(str);
}
function showCapitalize() { 
    const str = document.getElementById("strInput").value;
    document.getElementById("strResult").innerText = capitalizeWords(str);
}

// =====================
// 2️⃣ Array Functions
// =====================
function parseArray() {
    return document.getElementById("arrInput").value.split(',').map(Number);
}
function findMax(arr) { return Math.max(...arr); }
function findMin(arr) { return Math.min(...arr); }
function sumArray(arr) { return arr.reduce((sum, num) => sum + num, 0); }
function filterArray(arr) { return arr.filter(num => num >= 5); }

function showMax() { document.getElementById("arrResult").innerText = findMax(parseArray()); }
function showMin() { document.getElementById("arrResult").innerText = findMin(parseArray()); }
function showSum() { document.getElementById("arrResult").innerText = sumArray(parseArray()); }
function showFilter() { document.getElementById("arrResult").innerText = filterArray(parseArray()); }

// =====================
// 3️⃣ Mathematical Functions
// =====================
function factorial(n) {
    if (n < 0) return "Invalid input";
    let res = 1; for (let i=2;i<=n;i++) res *= i; return res;
}
function isPrime(n) {
    if(n<2) return false;
    for(let i=2;i<=Math.sqrt(n);i++) if(n%i===0) return false;
    return true;
}
function fibonacci(n) {
    if(n<=0) return []; if(n===1) return [0];
    let seq=[0,1]; while(seq.length<n) seq.push(seq[seq.length-1]+seq[seq.length-2]);
    return seq;
}

function showFactorial() { 
    const num = Number(document.getElementById("numInput").value);
    document.getElementById("mathResult").innerText = factorial(num);
}
function showPrime() { 
    const num = Number(document.getElementById("numInput").value);
    document.getElementById("mathResult").innerText = isPrime(num);
}
function showFibonacci() { 
    const num = Number(document.getElementById("numInput").value);
    document.getElementById("mathResult").innerText = fibonacci(num);
}
</script>

</body>
</html>
